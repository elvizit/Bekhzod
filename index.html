<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визитка — Тоджибоев Бехзод</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000e0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header-bg {
            background: linear-gradient(135deg, #e0e0e0 0%, #ffffff 100%);
            height: 120px;
            position: relative;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background-color: #bdbdbd;
            border-radius: 50%;
            border: 5px solid white;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar svg {
            width: 60px;
            fill: white;
        }

        .content {
            padding: 60px 20px 30px;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
        }

        .save-btn {
            background-color: #ff1e00;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .grid-item {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #555;
            font-size: 14px;
            transition: 0.3s;
        }

        .grid-item:hover {
            background: #f9f9f9;
        }

        .icon {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }

        .full-width-btn {
            display: block;
            background: #f8f9fa;
            border: 1px solid #eee;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
        }

        .full-width-btn:hover {
            background: #f0f0f0;
        }

        .tg-primary { border-left: 5px solid #0088cc; }
        .insta { border-left: 5px solid #e1306c; }
        .wa { border-left: 5px solid #25d366; }

    </style>
</head>

<div class="card">

        </div>

            <a href="bekhzodtodjiboev018@gmail.com" class="grid-item">
                <span class="icon">✉️</span>
                Email
            </a>
            <a href="tel:+998994880229" class="grid-item">
                <span class="icon">📱</span>
                Мобильный
            </a>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <a href="https://t.me/Bexzod_Todjiboyev" class="full-width-btn tg-primary">💬 Напиши мне в Телеграм</a>

        <a href="#" class="full-width-btn insta">📸 Instagram</a>
        <a href="#" class="full-width-btn wa">📞 WhatsApp</a>
    </div>
</div>

</body>
